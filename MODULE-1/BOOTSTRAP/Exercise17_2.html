<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.2 - Icon Navigation & Buttons</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Task 17.2 - Rich UI Icons
    </h2>
    <ul class="nav nav-pills mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="#">
                <i class="bi bi-house-door-fill"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">
                <i class="bi bi-person-fill"></i> User Profile
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">
                <i class="bi bi-gear-fill"></i> Preferences
            </a>
        </li>
    </ul>

        <i class="bi bi-download"></i> Save File
    </button>

        <i class="bi bi-check-circle-fill"></i> Complete Task
    </button>

        <i class="bi bi-trash-fill"></i> Erase Item
    </button>

<script src="js/bootstrap.bundle.min.js"></script>
