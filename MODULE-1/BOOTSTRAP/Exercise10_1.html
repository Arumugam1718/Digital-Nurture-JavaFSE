<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10.1 - Header Navbar</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">
            BrandName
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainCollapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainCollapsibleNavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Start
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Info
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Solutions
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Support
                    </a>
                </li>
            </ul>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Type here...">
                <button class="btn btn-success" type="submit">
                    Search
                </button>
            </form>
        </div>
    </div>
</nav>
<div class="mt-5 container">
    <h2>Adaptive Navigation Bar</h2>
    <p>Example of an expand-on-large navigation menu.</p>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
