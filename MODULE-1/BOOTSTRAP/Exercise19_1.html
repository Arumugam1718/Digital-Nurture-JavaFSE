<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 19.1 - Tooltips & Popovers</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 text-center container">
    <h2 class="mb-4">
        Task 19.1 - Bootstrap Info Elements
    </h2>
    <button type="button"
            class="btn btn-primary me-3"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Helpful info popup">
        Mouseover for Info
    </button>
    <button type="button"
            class="btn btn-success"
            data-bs-toggle="popover"
            title="Information Portal"
            data-bs-content="This contains a sample popover content message.">
        Toggle Popover Box
    </button>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
<script>
    const elementsForTooltips = Array.from(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    const initializedTooltips = elementsForTooltips.map(el => new bootstrap.Tooltip(el));
    const elementsForPopovers = Array.from(document.querySelectorAll('[data-bs-toggle="popover"]'));
    const initializedPopovers = elementsForPopovers.map(el => new bootstrap.Popover(el));
</script>
</body>
</html>
