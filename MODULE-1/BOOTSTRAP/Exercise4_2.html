<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4.2 - Quad Grid Layout</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Quad Section Grid - 4.2
    </h2>
    <div class="row">
        <div class="col-sm-3">
            <div class="text-white p-4 text-center bg-primary">
                Section A
            </div>
        </div>
        <div class="col-sm-3">
            <div class="text-white p-4 text-center bg-success">
                Section B
            </div>
        </div>
        <div class="col-sm-3">
            <div class="text-dark p-4 text-center bg-warning">
                Section C
            </div>
        </div>
        <div class="col-sm-3">
            <div class="text-white p-4 text-center bg-danger">
                Section D
            </div>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
