<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2 - Plan Pricing</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="container py-5">
    <h2 class="text-center mb-5">
        Pricing Tiers
    </h2>
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Starter</h3>
                <h4 class="my-3">$9/month</h4>
                <p>Single Site</p>
                <p>10 GB Disk Space</p>
                <button class="btn btn-primary mt-3" type="button">
                    Choose Starter
                </button>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Professional</h3>
                <h4 class="my-3">$19/month</h4>
                <p>5 Active Sites</p>
                <p>50 GB Disk Space</p>
                <button class="btn btn-success mt-3" type="button">
                    Choose Professional
                </button>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Enterprise</h3>
                <h4 class="my-3">$29/month</h4>
                <p>Unlimited Sites</p>
                <p>100 GB Disk Space</p>
                <button class="btn btn-danger mt-3" type="button">
                    Choose Enterprise
                </button>
            </div>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
