<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11.1 - User Card Panel</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Task 11.1 - Showcase Card
    </h2>
    <div class="mx-auto card" style="width: 18rem;">
        <img src="https://ui-avatars.com/api/?name=Jane+Smith&background=0D8ABC&color=fff&size=286"
             class="card-img-top"
             alt="Avatar Image">
        <div class="card-body">
            <h5 class="card-title">
                Jane Smith
            </h5>
            <p class="card-text">
                Full-stack engineer specialized in building modern user interfaces using CSS, JavaScript, and Bootstrap.
            </p>
            <a href="#" class="btn btn-primary">
                Open Profile
            </a>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
