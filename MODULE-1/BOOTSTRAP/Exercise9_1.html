<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.1 - Button Classes</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Bootstrap Buttons Collection
    </h2>
    <h4 class="mb-3">Standard Theme Buttons</h4>
    <div class="mb-4">
        <button class="btn btn-primary" type="button">Primary Action</button>
        <button class="btn btn-secondary" type="button">Secondary Action</button>
        <button class="btn btn-success" type="button">Success Status</button>
        <button class="btn btn-danger" type="button">Danger Alert</button>
        <button class="btn btn-warning" type="button">Warning Alert</button>
        <button class="btn btn-info" type="button">Info Details</button>
        <button class="btn btn-light" type="button">Light Mode</button>
        <button class="btn btn-dark" type="button">Dark Mode</button>
    </div>
    <hr>
    <h4 class="mb-3">Outline Border Buttons</h4>
    <div>
        <button class="btn btn-outline-primary" type="button">Outline Primary</button>
        <button class="btn btn-outline-secondary" type="button">Outline Secondary</button>
        <button class="btn btn-outline-success" type="button">Outline Success</button>
        <button class="btn btn-outline-danger" type="button">Outline Danger</button>
        <button class="btn btn-outline-warning" type="button">Outline Warning</button>
        <button class="btn btn-outline-info" type="button">Outline Info</button>
        <button class="btn btn-outline-dark" type="button">Outline Dark</button>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
