<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4.1 - Sidebar Layout</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <div class="mt-5 container">
        <div class="row">
            <div class="col-md-3">
                <div class="text-white p-4 bg-primary">
                    <h3>Navigation</h3>
                    <p>Control Panel</p>
                </div>
            </div>
            <div class="col-md-9">
                <div class="p-4 border bg-light">
                    <h2>Primary Workspace</h2>
                    <p>
                        This panel acts as the main viewport.
                        It spans 9 Bootstrap grid units, while the sidebar uses 3.
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
