<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.1 - Admin Dashboard</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Overview Dashboard
    </h2>
    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="text-white p-4 text-center rounded bg-primary">
                <h4>150</h4>
                <p>Active Members</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="text-white p-4 text-center rounded bg-success">
                <h4>$5000</h4>
                <p>Net Earnings</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="text-dark p-4 text-center rounded bg-warning">
                <h4>25</h4>
                <p>Awaiting Shipments</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="text-white p-4 text-center rounded bg-danger">
                <h4>10</h4>
                <p>Inbox Notifications</p>
            </div>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
