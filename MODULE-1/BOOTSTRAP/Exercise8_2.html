<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.2 - Authentication Portal</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <div class="justify-content-center row">
        <div class="col-md-6">
            <h2 class="text-center mb-4">
                Access Portal
            </h2>
            <form>
                <div class="form-floating mb-3">
                    <input class="form-control" id="txtUserEmail" placeholder="name@example.com" type="email">
                    <label for="txtUserEmail">
                        Registered Email
                    </label>
                </div>
                <div class="form-floating mb-3">
                    <input class="form-control" id="txtUserPass" placeholder="Password" type="password">
                    <label for="txtUserPass">
                        Security Key
                    </label>
                </div>
                <button class="w-100 btn btn-primary" type="submit">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
