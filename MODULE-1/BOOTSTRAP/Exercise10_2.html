<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10.2 - Tabbed & Pilled Navigation</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="mb-4">
        Task 10.2 - Custom Navigation Layouts
    </h2>
    <h4 class="mb-3">Simple Link Navigation</h4>
    <ul class="nav mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="#">Welcome</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Company</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Offerings</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Connect</a>
        </li>
    </ul>
    <h4 class="mb-3">Tabbed Controls</h4>
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Account</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Inbox</a>
        </li>
    </ul>
    <h4 class="mb-3">Pill Controls</h4>
    <ul class="nav nav-pills">
        <li class="nav-item">
            <a class="nav-link active" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">User Account</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Configuration</a>
        </li>
    </ul>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
