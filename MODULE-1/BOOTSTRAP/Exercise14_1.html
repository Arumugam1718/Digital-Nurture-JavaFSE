<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14.1 - Visibility Control</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Task 14.1 - Display Classes
    </h2>
    <div class="bg-danger text-white p-3 mb-3 d-none">
        This container is set to d-none and remains hidden on all devices.
    </div>
    <div class="bg-success text-white p-3 mb-3 d-none d-md-block">
        Visible only starting from medium screen sizes (md).
    </div>
    <div class="bg-primary text-white p-3 justify-content-center d-none d-lg-flex">
        Becomes a flex container on large screens (lg) and above.
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
