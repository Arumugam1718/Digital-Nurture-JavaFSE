<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7.1 - Typography Styles</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h1 class="display-1">
        Large Display Heading
    </h1>
    <p class="lead">
        A lead paragraph designed using Bootstrap styling conventions.
    </p>
    <p class="text-muted">
        This section of text is rendered in a muted gray color.
    </p>
    <p class="fw-bold">
        This text highlights strong weight (bold).
    </p>
    <p class="fst-italic">
        This paragraph represents italicized text style.
    </p>
    <p class="text-primary">
        This displays a paragraph using primary color theme.
    </p>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
