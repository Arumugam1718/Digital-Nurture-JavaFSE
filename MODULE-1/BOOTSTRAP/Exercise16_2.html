<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16.2 - Absolute Badge Overlay</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 text-center container">
    <h2 class="mb-4">
        Task 16.2 - Overlay Positioning
    </h2>
    <div class="d-inline-block position-relative">
        <img src="https://ui-avatars.com/api/?name=Product&background=45A049&color=fff&size=300"
             class="rounded img-fluid"
             alt="Badge Sample">
        <span class="position-absolute top-0 start-100 translate-middle rounded-pill bg-danger badge">
            Hot
        </span>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
