<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11.2 - Media Element Row</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="mt-5 container">
    <h2 class="text-center mb-4">
        Task 11.2 - Flexbox Media Row
    </h2>
    <div class="p-3 border d-flex">
        <img src="https://ui-avatars.com/api/?name=Jane+Smith&background=0D8ABC&color=fff&size=120"
             alt="Avatar Image"
             class="rounded me-3">
        <div>
            <h4>Jane Smith</h4>
            <p>
                Jane is a front-end specialist with expertise in modern styling, ES6 coding, and Bootstrap responsive grid development. This text resides adjacent to the profile avatar.
            </p>
            <button class="btn btn-primary" type="button">
                Explore Portfolio
            </button>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
